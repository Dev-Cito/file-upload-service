services:
  postgres:
    image: postgres:16-alpine
    container_name: upload_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: upload_db
    ports:
      - "5435:5432"
    volumes:
      - upload_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: upload_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - upload_minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  upload_postgres_data:
  upload_minio_data:
